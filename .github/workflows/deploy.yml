name: Deploy MkDocs to GitHub Pages
on:
  push:
    branches:
      - gh-pages  # Change this to 'master' if your repo uses master

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install MkDocs Material Theme
        run: |
          pip install mkdocs-material

      - name: Build and Deploy to gh-pages branch
        run: |
          mkdocs gh-deploy --force
