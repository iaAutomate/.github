site_name: Org Developer Hub
site_description: Global safety rules, architecture, and development workflows.

theme:
  name: material
  features:
    - navigation.tabs        # Horizontal top navigation tabs
    - navigation.sections    # Collapsible sidebar sections
    - search.suggest         # Auto-complete search bar terms
    - content.code.copy      # Quick-copy button for code blocks
  palette:
    # Default theme (Dark Mode)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    # Fallback theme (Light Mode)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

# 🗺️ Sidebar Navigation Menu
nav:
  - "Welcome Guide": index.md
  - "Git Workflows":
    - "Troubleshooting & FAQ": workflow-faq.md
  - "Engineering Standards":
    - "Code Formatting": code-standards.md
